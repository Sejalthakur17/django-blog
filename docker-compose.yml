version: "3.9"

services:
  db:
    image: postgres:15
    container_name: blog_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network

  backend:
    image: 909646905892.dkr.ecr.ap-south-1.amazonaws.com/django-blog:latest
    container_name: blog_backend
    command: >
     sh -c "
     python manage.py migrate &&
     gunicorn backend.django_project.wsgi:application --bind 0.0.0.0:8000
     "
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - backend_network

volumes:
    - ./backend:/app/backend
    - ./frontend:/app/frontend

networks:
  backend_network: