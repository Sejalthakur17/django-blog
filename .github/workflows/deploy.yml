name: CI/CD to ECR + EC2 (Docker Compose)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: django-blog
  AWS_ACCOUNT_ID: 909646905892
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
   runs-on: ubuntu-latest

   steps:
     - name: Checkout
       uses: actions/checkout@v4

     - name: Configure AWS credentials
       uses: aws-actions/configure-aws-credentials@v3
       with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ${{ env.AWS_REGION }}

     - name: Ensure ECR repository exists
       run: |
        aws ecr describe-repositories --repository-names $ECR_REPOSITORY 2>/dev/null || \
        aws ecr create-repository --repository-name $ECR_REPOSITORY

     - name: Login to ECR
       run: |
        aws ecr get-login-password --region $AWS_REGION \
        | docker login --username AWS --password-stdin \
        $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
 
     - name: Build Docker Image
       run: |
        docker build -t $ECR_REPOSITORY -f backend/Dockerfile .

     - name: Tag Docker Image
       run: |
        docker tag $ECR_REPOSITORY:latest \
        $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

     - name: Push Docker Image
       run: |
        docker push \
        $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

     - name: Deploy to EC2
       uses: appleboy/ssh-action@v0.1.10
       with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
         if ! command -v docker &> /dev/null; then
          sudo apt update
          sudo apt install docker.io -y
          sudo usermod -aG docker ubuntu
          newgrp docker
         fi

         if ! command -v docker-compose &> /dev/null; then
          sudo apt install docker-compose -y
         fi

         if ! command -v aws &> /dev/null; then
          sudo apt update
          sudo apt install awscli -y
         fi

         aws ecr get-login-password --region ap-south-1 \
         | docker login --username AWS --password-stdin \
         909646905892.dkr.ecr.ap-south-1.amazonaws.com

         if [ ! -d "django-blog" ]; then
          git clone https://github.com/Sejalthakur17/django-blog.git
         fi

         cd django-blog
         git pull

         docker pull 909646905892.dkr.ecr.ap-south-1.amazonaws.com/django-blog:latest

         docker-compose down
         docker-compose up -d
 
         